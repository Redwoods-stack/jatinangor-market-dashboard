function el(tag, attrs, children){

    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  }
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null) return;
      e.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return e;
}

/* ============ SVG CHART ENGINE ============ */
var PAD={t:14,r:16,b:30,l:46};
function niceMax(v){ if(v<=0) return 1; var p=Math.pow(10,Math.floor(Math.log10(v))); var f=v/p; var n=f<=1?1:f<=2?2:f<=5?5:10; return n*p; }

function chartFrame(width,height){
  var svg=svgEl("svg",{viewBox:"0 0 "+width+" "+height, width:"100%", height:height, style:"display:block;overflow:visible"});
  return svg;
}
function gridY(svg,W,H,maxv,fmtFn,ticks){
  ticks=ticks||4;
  for(var i=0;i<=ticks;i++){
    var val=maxv*i/ticks;
    var y=PAD.t+(H-PAD.t-PAD.b)*(1-i/ticks);
    svg.appendChild(svgEl("line",{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.line,"stroke-width":1}));
    svg.appendChild(svgEl("text",{x:PAD.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:C.fog},[document.createTextNode((fmtFn||fmt)(val))]));
  }
}
function xLabels(svg,W,H,labels){
  var n=labels.length, plotW=W-PAD.l-PAD.r;
  labels.forEach(function(lb,i){
    var x=PAD.l+ (n===1?plotW/2 : plotW*i/(n-1));
    svg.appendChild(svgEl("text",{x:x,y:H-PAD.b+18,"text-anchor":"middle","font-size":11,fill:C.fog},[document.createTextNode(lb)]));
  });
}

/* multi-series line chart. series=[{key,name,color,width,dot}], rows=[{x, key:val}] */
function lineChart(rows, series, opts){
  opts=opts||{}; var W=opts.width||640, H=opts.height||300;
  var svg=chartFrame(W,H);
  var plotW=W-PAD.l-PAD.r, plotH=H-PAD.t-PAD.b;
  var allVals=[]; rows.forEach(function(r){ series.forEach(function(s){ if(r[s.key]!=null) allVals.push(r[s.key]); }); });
  var lo = opts.percent? Math.min(0,Math.min.apply(null,allVals)) : 0;
  var hi = opts.domainMax!=null?opts.domainMax: niceMax(Math.max.apply(null,allVals)||1);
  if(opts.domainMin!=null) lo=opts.domainMin;
  var fmtFn = opts.fmtY ? opts.fmtY : (opts.percent? function(v){return (v*100).toFixed(0)+"%";} : fmt);
  // grid
  var ticks=4;
  for(var i=0;i<=ticks;i++){
    var val=lo+(hi-lo)*i/ticks;
    var y=PAD.t+plotH*(1-(val-lo)/(hi-lo));
    svg.appendChild(svgEl("line",{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.line}));
    svg.appendChild(svgEl("text",{x:PAD.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:C.fog},[document.createTextNode(fmtFn(val))]));
  }
  if(opts.zeroLine && lo<0){
    var yz=PAD.t+plotH*(1-(0-lo)/(hi-lo));
    svg.appendChild(svgEl("line",{x1:PAD.l,y1:yz,x2:W-PAD.r,y2:yz,stroke:C.fog,"stroke-dasharray":"3 3"}));
  }
  var n=rows.length;
  function px(i){ return PAD.l+(n===1?plotW/2:plotW*i/(n-1)); }
  function py(v){ return PAD.t+plotH*(1-(v-lo)/(hi-lo)); }
  // lines
  series.forEach(function(s){
    var d="",started=false;
    rows.forEach(function(r,i){
      var v=r[s.key];
      if(v==null){ return; }
      d+=(started?"L":"M")+px(i)+" "+py(v)+" "; started=true;
    });
    var attrs={d:d,fill:"none",stroke:s.color,"stroke-width":s.width||1.8,"stroke-linejoin":"round","stroke-linecap":"round"};
    if(s.dash) attrs["stroke-dasharray"]="5 4";
    svg.appendChild(svgEl("path",attrs));
    if(s.dot){
      rows.forEach(function(r,i){ if(r[s.key]!=null) svg.appendChild(svgEl("circle",{cx:px(i),cy:py(r[s.key]),r:3,fill:s.color})); });
    }
  });
  // x labels
  xLabels(svg,W,H,rows.map(function(r){return r.x;}));
  // hover overlay
  rows.forEach(function(r,i){
    var hx=px(i);
    var hit=svgEl("rect",{x:hx-(plotW/n/2),y:PAD.t,width:Math.max(plotW/n,12),height:plotH,fill:"transparent",style:"cursor:crosshair"});
    hit.addEventListener("mousemove",function(ev){
      var html='<div style="color:'+C.fog+';margin-bottom:5px;font-weight:600">'+esc(r.x)+'</div>';
      series.forEach(function(s){ if(r[s.key]!=null) html+=tipRow(s.color,s.name,opts.arrow?arrowPct(r[s.key]):(opts.fmtY?opts.fmtY(r[s.key]):(opts.percent?pct(r[s.key]):fmt(r[s.key])))); });
      showTip(html,ev.clientX,ev.clientY);
    });
    hit.addEventListener("mouseleave",hideTip);
    svg.appendChild(hit);
  });
  return svg;
}

/* grouped vertical bar chart */
function barChart(rows, series, opts){
  opts=opts||{}; var W=opts.width||640, H=opts.height||300;
  var svg=chartFrame(W,H);
  var plotW=W-PAD.l-PAD.r, plotH=H-PAD.t-PAD.b;
  var allVals=[]; rows.forEach(function(r){ series.forEach(function(s){ if(r[s.key]!=null) allVals.push(r[s.key]); }); });
  var hi=niceMax(Math.max.apply(null,allVals)||1);
  gridY(svg,W,H,hi,opts.fmtY);
  var n=rows.length, groupW=plotW/n, barGap=0.18*groupW, innerW=groupW-barGap;
  var bw=innerW/series.length;
  function py(v){ return PAD.t+plotH*(1-v/hi); }
  rows.forEach(function(r,i){
    var gx=PAD.l+groupW*i+barGap/2;
    series.forEach(function(s,si){
      var v=r[s.key]; if(v==null) return;
      var h=plotH*v/hi, x=gx+bw*si, y=py(v);
      var rect=svgEl("rect",{x:x,y:y,width:Math.max(bw-2,1),height:Math.max(h,0),fill:s.color,rx:3,style:"cursor:pointer;transition:opacity .1s"});
      rect.addEventListener("mousemove",function(ev){
        var html='<div style="color:'+C.fog+';margin-bottom:5px;font-weight:600">'+esc(r.x)+'</div>';
        series.forEach(function(ss){ if(r[ss.key]!=null) html+=tipRow(ss.color,ss.name,(opts.fmtY||fmt)(r[ss.key])); });
        showTip(html,ev.clientX,ev.clientY);
      });
      rect.addEventListener("mouseleave",hideTip);
      svg.appendChild(rect);
    });
  });
  xLabels(svg,W,H,rows.map(function(r){return r.x;}));
  return svg;
}

/* horizontal bar (ranking). items=[{name,value,color,delta?}] · opts.showDelta adds a ▲/▼ % column */
function hbarChart(items, opts){
  opts=opts||{}; var W=opts.width||640, showDelta=opts.showDelta;
  var rowH=24, top=8, H=top+items.length*rowH+8;
  var labelW=opts.labelW||190, plotL=labelW, plotR=W-(showDelta?104:24);
  var svg=chartFrame(W,H);
  var hi=niceMax(Math.max.apply(null,items.map(function(d){return d.value||0;}))||1);
  items.forEach(function(d,i){
    var y=top+i*rowH;
    svg.appendChild(svgEl("text",{x:labelW-8,y:y+rowH/2+4,"text-anchor":"end","font-size":10.5,fill:(d.bold?C.ink:C.sub),"font-weight":(d.bold?700:400)},[document.createTextNode(d.name)]));
    var w=(plotR-plotL)*(d.value||0)/hi;
    var rect=svgEl("rect",{x:plotL,y:y+3,width:Math.max(w,0),height:rowH-8,fill:d.color,rx:3,style:"cursor:pointer"});
    rect.addEventListener("mousemove",function(ev){ showTip(tipRow(d.color,d.name,fmt(d.value))+(showDelta&&d.delta!=null?tipRow(d.delta>=0?C.fairway:C.flag,"vs baseline",arrowPct(d.delta)):""),ev.clientX,ev.clientY); });
    rect.addEventListener("mouseleave",hideTip);
    svg.appendChild(rect);
    svg.appendChild(svgEl("text",{x:plotL+Math.max(w,0)+6,y:y+rowH/2+4,"font-size":10.5,fill:C.fog},[document.createTextNode(fmt(d.value))]));
    if(showDelta){
      var up=d.delta!=null&&d.delta>=0;
      svg.appendChild(svgEl("text",{x:W-4,y:y+rowH/2+4,"text-anchor":"end","font-size":10,"font-weight":600,fill:d.delta==null?C.fog:(up?C.fairway:C.flag)},
        [document.createTextNode(d.delta==null?"—":(up?"▲ ":"▼ ")+(Math.abs(d.delta)*100).toFixed(1)+"%")]));
    }
  });
  return svg;
}

/* 100% stacked area. rows=[{x, key:val}] values are absolute; normalized here */
function stackedAreaPct(rows, series, opts){
  opts=opts||{}; var W=opts.width||640, H=opts.height||260;
  var svg=chartFrame(W,H);
  var plotW=W-PAD.l-PAD.r, plotH=H-PAD.t-PAD.b;
  var n=rows.length;
  function px(i){ return PAD.l+(n===1?plotW/2:plotW*i/(n-1)); }
  function py(v){ return PAD.t+plotH*(1-v); }
  // grid 0-100%
  for(var i=0;i<=4;i++){ var y=PAD.t+plotH*(1-i/4); svg.appendChild(svgEl("line",{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.line})); svg.appendChild(svgEl("text",{x:PAD.l-8,y:y+4,"text-anchor":"end","font-size":11,fill:C.fog},[document.createTextNode((i*25)+"%")])); }
  // normalize
  var norm=rows.map(function(r){
    var tot=0; series.forEach(function(s){ tot+=(r[s.key]||0); });
    var o={x:r.x,_tot:tot}; series.forEach(function(s){ o[s.key]= tot? (r[s.key]||0)/tot : 0; }); return o;
  });
  var cum=norm.map(function(){return 0;});
  series.forEach(function(s){
    var top=[],bot=[];
    norm.forEach(function(r,i){ var b=cum[i], t=cum[i]+r[s.key]; top.push([px(i),py(t)]); bot.push([px(i),py(b)]); cum[i]=t; });
    var d="M"+top.map(function(p){return p[0]+" "+p[1];}).join("L")+"L"+bot.slice().reverse().map(function(p){return p[0]+" "+p[1];}).join("L")+"Z";
    svg.appendChild(svgEl("path",{d:d,fill:s.color,"fill-opacity":(s.key==="JNGR"?0.88:0.55),stroke:s.color,"stroke-width":1}));
  });
  // hover
  norm.forEach(function(r,i){
    var hx=px(i);
    var hit=svgEl("rect",{x:hx-(plotW/n/2),y:PAD.t,width:Math.max(plotW/n,12),height:plotH,fill:"transparent",style:"cursor:crosshair"});
    hit.addEventListener("mousemove",function(ev){
      var html='<div style="color:'+C.fog+';margin-bottom:5px;font-weight:600">'+esc(r.x)+'</div>';
      series.forEach(function(s){ html+=tipRow(s.color,s.name,pct(r[s.key])); });
      showTip(html,ev.clientX,ev.clientY);
    });
    hit.addEventListener("mouseleave",hideTip);
    svg.appendChild(hit);
  });
  xLabels(svg,W,H,rows.map(function(r){return r.x;}));
  return svg;
}

/* donut. items=[{name,value,color}] */
function donut(items, opts){
  opts=opts||{}; var size=opts.size||220, r=size/2, ir=r*0.62;
  var svg=chartFrame(size,size);
  var g=svgEl("g",{transform:"translate("+r+","+r+")"});
  var tot=sum(items.map(function(d){return d.value;}));
  var a0=-Math.PI/2;
  items.forEach(function(d){
    var frac=tot? d.value/tot:0, a1=a0+frac*2*Math.PI;
    var large=(a1-a0)>Math.PI?1:0;
    var x0=Math.cos(a0)*r, y0=Math.sin(a0)*r, x1=Math.cos(a1)*r, y1=Math.sin(a1)*r;
    var xi0=Math.cos(a0)*ir, yi0=Math.sin(a0)*ir, xi1=Math.cos(a1)*ir, yi1=Math.sin(a1)*ir;
    var path=svgEl("path",{d:"M"+x0+" "+y0+"A"+r+" "+r+" 0 "+large+" 1 "+x1+" "+y1+"L"+xi1+" "+yi1+"A"+ir+" "+ir+" 0 "+large+" 0 "+xi0+" "+yi0+"Z",fill:d.color,style:"cursor:pointer"});
    (function(dd){
      path.addEventListener("mousemove",function(ev){ showTip(tipRow(dd.color,dd.name,pct(tot?dd.value/tot:0)+" · "+fmt(dd.value)),ev.clientX,ev.clientY); });
      path.addEventListener("mouseleave",hideTip);
    })(d);
    g.appendChild(path); a0=a1;
  });
  svg.appendChild(g);
  return svg;
}

    var w=(plotR-plotL)*(d.value||0)/hi;
    var rect=svgEl("rect",{x:plotL,y:y+3,width:Math.max(w,0),height:rowH-8,fill:d.color,rx:3,style:"cursor:pointer"});
    rect.addEventListener("mousemove",function(ev){ showTip(tipRow(d.color,d.name,fmtFn(d.value)),ev.clientX,ev.clientY); });

var state1={year:"2026", gran:"monthly"};
function renderMarket(root){
  root.innerHTML="";
  var year=state1.year, gran=state1.gran, b=DATA.bandung[year], lastIdx=activeMonths(year);
  var compSeries=COMPS.map(function(c){return {key:c,name:DATA.compNames[c],color:COMP_COLOR[c],width:c==="JNGR"?3:1.8,dot:c==="JNGR"};});

  /* build period rows */
  var rows;
  if(gran==="monthly"){
    rows=[]; for(var i=0;i<=lastIdx;i++){ var r={x:M[i]}; COMPS.forEach(function(c){ r[c]=(b[c]&&b[c][i]!=null)?b[c][i]:null; }); rows.push(r); }
  } else if(gran==="quarterly"){
    rows=QNAMES.map(function(qn,qi){ var r={x:qn}; COMPS.forEach(function(c){ var vals=Q[qi].map(function(mi){return b[c]?b[c][mi]:null;}).filter(function(v){return v!=null&&v>0;}); r[c]=vals.length?sum(vals):null; }); return r; }).filter(function(r){return COMPS.some(function(c){return r[c]!=null;});});
  } else {
    rows=YEARS.map(function(y){ var r={x:y}; COMPS.forEach(function(c){ r[c]=DATA.bandung[y][c]?sum(DATA.bandung[y][c].filter(function(v){return v>0;})):null; }); return r; });
  }

  /* % change rows */
  var change=rows.map(function(row,i){ var o={x:row.x}; COMPS.forEach(function(c){ var cur=row[c], prev=i>0?rows[i-1][c]:null; o[c]=(cur!=null&&prev!=null&&prev!==0)?(cur-prev)/prev:null; }); return o; });

  /* KPIs YTD-comparable */
  var span=lastIdx+1;
  function ytd(bb,c){ return bb&&bb[c]?sum(bb[c].slice(0,span).filter(function(v){return v>0;})):0; }
  var total=COMPS.reduce(function(s,c){return s+ytd(b,c);},0);
  var py=String(+year-1), pb=DATA.bandung[py];
  var totalPy=pb?COMPS.reduce(function(s,c){return s+ytd(pb,c);},0):null;
  var kpis=COMPS.map(function(c){
    var v=ytd(b,c), share=total?v/total:null;
    var pv=pb?ytd(pb,c):null, pshare=(pb&&totalPy)?pv/totalPy:null;
    return {c:c,v:v,share:share,delta:pv?(v-pv)/pv:null,shareDelta:pshare!=null?share-pshare:null};
  });
  var spanLabel=year==="2026"?"YTD ("+M[lastIdx]+")":"Full year";

  /* controls */
  var controls=el("div",{style:"display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:18px"},[
    segmented("Year",year,YEARS,function(v){state1.year=v;renderMarket(root);}),
    segmented("Breakdown",gran,[["monthly","Monthly"],["quarterly","Quarterly"],["yearly","Yearly"]],function(v){state1.gran=v;renderMarket(root);}),
    el("div",{style:"margin-left:auto;font-size:12px;color:"+C.fog,html:"Basis: <b style='color:"+C.ink+"'>"+spanLabel+"</b> · Bandung Raya 4-course market"})
  ]);
  root.appendChild(controls);

  /* KPI cards */
  var kpiGrid=el("div",{style:"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px"},
    kpis.map(function(k){ return stat(DATA.compNames[k.c],fmt(k.v),{accent:COMP_COLOR[k.c],delta:k.delta,
      sub:"Share "+pct(k.share)+(k.shareDelta!=null?"  ("+(k.shareDelta>=0?"▲":"▼")+Math.abs(k.shareDelta*100).toFixed(1)+" pt)":"")}); }));
  root.appendChild(kpiGrid);

  /* rounds chart */
  var roundsNode = gran==="yearly"
    ? barChart(rows,compSeries,{height:320})
    : lineChart(rows,compSeries,{height:320});
  root.appendChild(card("Rounds played — "+gran, year+" · "+spanLabel, el("div",{},[roundsNode,legendRow(compSeries)])));

  /* two-up: % change + composition */
  var twoUp=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px"});
  twoUp.appendChild(card("% change over period",
    gran==="monthly"?"Month-over-month":gran==="quarterly"?"Quarter-over-quarter":"Year-over-year",
    el("div",{},[lineChart(change,compSeries,{height:260,percent:true,zeroLine:true,arrow:true,domainMin:undefined}),legendRow(compSeries)])));
  twoUp.appendChild(card("Share composition", gran+" · % of 4-course market",
    el("div",{},[stackedAreaPct(rows,compSeries,{height:260}),legendRow(compSeries)])));
  root.appendChild(twoUp);

  /* table */
  root.appendChild(card("Detail table", gran+" rounds · "+year, dataTable(rows), "margin-top:16px"));
}

  ]));
  pHead.appendChild(el("img",{src:IMGS.logo,alt:"",style:"height:58px;object-fit:contain;opacity:.95"}));
  pIn.appendChild(pHead);
  var pGrid=el("div",{style:"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px"});
  [["chart","Deep market data","Every Bandung Raya rival and "+DATA.gcmai.length+" national courses, tracked monthly since 2021."],
   ["shield","Audited numbers","FY2025 figures tie directly to the independent auditor's report — not estimates."],
   ["swap","Fair comparisons","Cross-year views always compare the same month span, so partial years read honestly."],
   ["arrow","Decision-ready","Interactive views built for management reviews, owner reporting and bank discussions."]].forEach(function(p){
    pGrid.appendChild(el("div",{style:"background:#ffffff0f;border:1px solid #ffffff1c;border-radius:14px;padding:18px 18px 20px"},[
      el("div",{style:"width:34px;height:34px;border-radius:9px;background:"+C.lime+";display:grid;place-items:center;margin-bottom:12px"},[icon(p[0],"#15281a",17)]),
      el("div",{style:"color:#ffffff;font-weight:600;font-size:14px;margin-bottom:6px"},p[1]),
      el("div",{style:"color:#c4d4c6;font-size:12px;line-height:1.6"},p[2])
    ]));
  });
  pIn.appendChild(pGrid);
  phil.appendChild(pIn);
  app.appendChild(phil);

  /* footer */
  var foot=el("footer",{style:"max-width:1240px;margin:46px auto 0;padding:22px 24px 8px;border-top:1px solid "+C.line+";display:flex;align-items:center;gap:14px;flex-wrap:wrap"});
  foot.appendChild(el("div",{style:"width:34px;height:34px;border-radius:9px;background:"+C.deep+";display:grid;place-items:center;flex:none"},[
    el("img",{src:IMGS.logo,alt:"",style:"width:24px;height:24px;object-fit:contain"})
  ]));
  foot.appendChild(el("div",{style:"font-size:11.5px;color:"+C.fog+";line-height:1.6"},"PT Langen Kridha Pratyangga Tbk · Jatinangor National Golf & Resort"));
  foot.appendChild(el("div",{style:"margin-left:auto;font-size:11px;color:"+C.fog+";line-height:1.6;text-align:right",
    html:"Built from the Market Share workbooks & FY2025 audited FS. <b style='color:"+C.sub+"'>Internal use — Jatinangor team.</b>"}));
  app.appendChild(foot);
}
function categoryCard(id,img,iconName,title,desc,stats,accent){
  var c=el("div",{style:"background:"+C.panel+";border:1px solid "+C.line+";border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s",
    onclick:function(){ SECTION=id; renderSection(); window.scrollTo(0,0); }});
  c.addEventListener("mouseenter",function(){ c.style.transform="translateY(-4px)"; c.style.borderColor=accent; c.style.boxShadow="0 16px 36px #10271a1f"; });
  c.addEventListener("mouseleave",function(){ c.style.transform=""; c.style.borderColor=C.line; c.style.boxShadow=""; });
  c.appendChild(el("div",{style:"height:168px;background:url('"+img+"') center/cover no-repeat"}));
  var body=el("div",{style:"padding:20px 24px 24px"});
  body.appendChild(el("div",{style:"display:flex;align-items:center;gap:11px;margin-bottom:10px"},[
    el("div",{style:"width:38px;height:38px;border-radius:11px;background:"+accent+"22;display:grid;place-items:center;flex:none"},[icon(iconName,accent,19)]),
    el("div",{style:"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:20px;color:"+C.ink},title)
  ]));
  body.appendChild(el("div",{style:"font-size:13px;color:"+C.sub+";line-height:1.55;margin-bottom:18px"},desc));
  var sb=el("div",{style:"display:flex;gap:18px"});
  stats.forEach(function(s){ sb.appendChild(el("div",{},[
    el("div",{style:"font-size:17px;font-weight:700;color:"+accent+";font-family:'Helvetica Neue',Helvetica,Arial,sans-serif"},s[0]),
    el("div",{style:"font-size:10px;color:"+C.fog+";text-transform:uppercase;letter-spacing:.06em;margin-top:2px"},s[1])
  ])); });
  body.appendChild(sb);
  body.appendChild(el("div",{style:"margin-top:16px;font-size:13px;color:"+(accent===RCOL.budget?C.sub:accent)+";font-weight:600"},"Open "+title+" →"));
  c.appendChild(body);
  return c;
}

/* ---------- SECTION (golf or room) ---------- */
function renderSection(){
  var app=appRoot();
  var isGolf=SECTION==="golf", isAudit=SECTION==="audit";
  var accent=isGolf?C.fairway:(isAudit?C.MV:RCOL.budget);
  var tabs=isGolf?GOLF_TABS:(isAudit?AUDIT_TABS:ROOM_TABS);
  var cur=isGolf?golfTab:(isAudit?auditTab:roomTab);

  var header=el("header",{style:"border-bottom:1px solid "+C.line+";padding:18px 28px 0;background:linear-gradient(180deg,"+C.grad+","+C.bg+")"});
  var topRow=el("div",{style:"display:flex;align-items:center;gap:14px;flex-wrap:wrap"});
  // home button
  topRow.appendChild(el("button",{style:"border:1px solid "+C.line+";background:"+C.panel2+";color:"+C.sub+";cursor:pointer;border-radius:9px;padding:7px 13px;font-size:13px;font-family:inherit",
    onclick:function(){ SECTION=null; renderLanding(); window.scrollTo(0,0); }},"← Home"));
  topRow.appendChild(el("div",{style:"width:38px;height:38px;border-radius:10px;background:"+C.deep+";display:grid;place-items:center;flex:none"},[
    el("img",{src:IMGS.logo,alt:"",style:"width:27px;height:27px;object-fit:contain"})
  ]));
  topRow.appendChild(el("div",{},[
    el("div",{style:"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:19px"},isGolf?"Golf — Market Share":(isAudit?"Audit Report — FY2025":"Room / Hotel — Performance")),
    el("div",{style:"font-size:12px;color:"+C.fog+";margin-top:1px"},isAudit?"PT Langen Kridha Pratyangga Tbk · Jatinangor National Golf & Resort":"Jatinangor National Golf & Resort")
  ]));
  topRow.appendChild(el("div",{style:"margin-left:auto;font-size:11px;color:"+C.fog+";text-align:right;line-height:1.6",
    html:isGolf?"Bandung Raya rivals: <b style='color:"+C.ink+"'>KBP · Mountain View · Dago</b><br>2026 through <b style='color:"+C.fairway+"'>Jun (JNGR) / May (rivals)</b>"
        :isAudit?"<b style='color:"+C.gold+"'>DRAFT</b> audited FS · KAP Sabar & Rekan<br>FY2025 vs FY2024 · figures in <b style='color:"+C.ink+"'>IDR</b>"
                :"2026 actuals through <b style='color:"+accent+"'>May / early June</b><br>vs 2025 actual & 2026 budget"}));
  header.appendChild(topRow);

  var nav=el("nav",{style:"display:flex;gap:4px;margin-top:18px"});
  tabs.forEach(function(t){
    var active=cur===t[0];
    nav.appendChild(el("button",{
      style:"border:none;background:transparent;cursor:pointer;padding:10px 16px 12px;font-size:14px;font-family:inherit;transition:color .15s;border-bottom:2px solid "+(active?accent:"transparent")+";color:"+(active?C.ink:C.fog)+";font-weight:"+(active?600:400),
      onclick:function(){ if(isGolf) golfTab=t[0]; else if(isAudit) auditTab=t[0]; else roomTab=t[0]; renderSection(); }
    },t[1]));
  });
  header.appendChild(nav);
  app.appendChild(header);

  var main=el("main",{style:"max-width:1180px;margin:0 auto;padding:26px 28px 0"});
  var view=el("div",{});
  main.appendChild(view);
  if(isGolf){
    if(golfTab==="market") renderMarket(view);
    else if(golfTab==="overall") renderOverall(view);
    else if(golfTab==="gcmai") renderGCMAI(view);
    else renderGolfSegments(view);
  } else if(isAudit){
    if(auditTab==="overview") renderAuditOverview(view);
    else if(auditTab==="pnl") renderAuditPnl(view);
    else if(auditTab==="balance") renderAuditBS(view);
    else if(auditTab==="cashflow") renderAuditCF(view);
    else renderAuditAppendix(view);
  } else {
    if(roomTab==="perf") renderRoomPerf(view);
    else if(roomTab==="types") renderRoomTypes(view);
    else renderSegments(view);
  }

  main.appendChild(el("footer",{style:"margin-top:40px;padding-top:18px;border-top:1px solid "+C.line+";font-size:11px;color:"+C.fog+";line-height:1.6",
    html:isGolf
      ? "Source: Market Share 2025–2026 (Rounds). Market share = a course's rounds ÷ total rounds of the tracked field. 2026 figures are YTD; cross-year comparisons use the same month span. <b style='color:"+C.sub+"'>Internal use — Jatinangor team.</b>"
      : isAudit
      ? "Source: DRAFT Financial Statements of PT Langen Kridha Pratyangga Tbk, December 31, 2025, with Independent Auditor's Report by KAP Sabar & Rekan dated June 2, 2026. Figures in full IDR (B = billion, M = million). Draft — subject to change until final issuance. <b style='color:"+C.sub+"'>Internal use — Jatinangor team.</b>"
      : "Source: Market Share Room 2026 workbook. Revenue in IDR; ARR = revenue ÷ room nights. 2026 figures are YTD vs 2025 actual and 2026 budget. <b style='color:"+C.sub+"'>Internal use — Jatinangor team.</b>"}));
  app.appendChild(main);
}

/* ---------- THEME TOGGLE (floating) ---------- */
var THEME_BTN;
function ensureThemeBtn(){
  if(!THEME_BTN){
    THEME_BTN=el("button",{onclick:function(){ applyTheme(THEME==="dark"?"light":"dark"); mountApp(); }});
    document.body.appendChild(THEME_BTN);
  }
  THEME_BTN.innerHTML="";
  THEME_BTN.appendChild(icon(THEME==="dark"?"sun":"moon",C.ink,15));
  THEME_BTN.appendChild(el("span",{},THEME==="dark"?"Light":"Dark"));
  THEME_BTN.setAttribute("style","position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;align-items:center;gap:7px;border:1px solid "+C.line+";background:"+C.panel2+";color:"+C.ink+";cursor:pointer;border-radius:11px;padding:9px 14px;font-size:13px;font-weight:600;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;box-shadow:0 4px 16px #0005;transition:background .15s,border-color .15s");
}

function mountApp(){ if(SECTION) renderSection(); else renderLanding(); ensureThemeBtn(); }
window.addEventListener("DOMContentLoaded",mountApp);

</script>
</body>
</html>
